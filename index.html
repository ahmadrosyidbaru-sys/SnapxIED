<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="zLXkD3HCnlS_8Brjc4aApYmXSFZ2Ik1J6k2dO6zax_c" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>✨ Eid Studio - Edisi Idul Adha ✨</title>

    <meta name="description" content="Gunakan Eid Studio untuk pengalaman photobooth digital yang seru, otomatis, dan gratis langsung dari browser kamu. Abadikan momen lebaranmu sekarang!">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://ahmadrosyidbaru-sys.github.io/photoboth/" />

    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 20 Font Islami & Elegan -->
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@700&family=Amiri:wght@700&family=Aref+Ruqaa:wght@700&family=Cairo:wght@700&family=Changa:wght@700&family=Cinzel:wght@700&family=Cormorant+Garamond:wght@700&family=El+Messiri:wght@700&family=Katibeh&family=Lalezar&family=Lateef:wght@700&family=Mada:wght@700&family=Marcellus&family=Markazi+Text:wght@700&family=Mirza:wght@700&family=Philosopher:wght@700&family=Rakkas&family=Reem+Kufi:wght@700&family=Tajawal:wght@700&family=Tangerine:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Unbounded:wght@900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        eid: {
                            green: '#047857', gold: '#F59E0B', cream: '#FEF3C7', dark: '#064E3B', darker: '#022C22'
                        }
                    },
                    boxShadow: {
                        'eid': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'eid-hover': '6px 6px 0px 0px rgba(0,0,0,1)',
                        'eid-dark': '4px 4px 0px 0px #F59E0B',
                        'eid-dark-hover': '6px 6px 0px 0px #047857',
                    },
                    animation: {
                        'blob': 'blob 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1)',
                        'grid-scroll': 'gridScroll 20s linear infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        },
                        gridScroll: {
                            '0%': { backgroundPosition: '0 0' },
                            '100%': { backgroundPosition: '50px 50px' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100dvh; overflow-x: hidden; scroll-behavior: smooth; }
        .bg-eid-grid { background-size: 50px 50px; background-image: radial-gradient(circle, rgba(245, 158, 11, 0.25) 2.5px, transparent 2.5px); }
        .dark .bg-eid-grid { background-image: radial-gradient(circle, rgba(245, 158, 11, 0.15) 2px, transparent 2px); }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .dark .glass-panel { background: rgba(6, 78, 59, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .mirror { transform: scaleX(-1); }
        #countdown-box { opacity: 0.9; font-weight: 800; pointer-events: none; text-shadow: 4px 4px 0px #047857, -4px -4px 0px #F59E0B; z-index: 50; color: white; font-family: 'Unbounded', sans-serif; }
        .flash-active { animation: flash 0.4s ease-out; }
        @keyframes flash { 0% { background: #fff; opacity: 1; } 100% { background: transparent; opacity: 0; } }

        /* Canvas Wrapper untuk Stiker */
        #canvas-wrapper { width: auto; max-width: 100%; border-radius: 14px; border: 4px solid #000; box-shadow: 8px 8px 0px 0px rgba(0,0,0,1); background: #eee; transition: all 0.3s; position: relative; display: inline-block; overflow: hidden; }
        .dark #canvas-wrapper { border-color: #fff; box-shadow: 8px 8px 0px 0px #F59E0B; }
        canvas { display: block; width: 100%; height: auto; max-height: 70vh; }
        #sticker-area { pointer-events: none; }
        #sticker-area img { pointer-events: auto; touch-action: none; }
        .sticker-active { outline: 3px dashed #F59E0B; outline-offset: 2px; }

        .btn-eid { border-radius: 12px; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase; border: 3px solid #000; box-shadow: 4px 4px 0px 0px #000; transition: all 150ms ease; user-select: none; -webkit-tap-highlight-color: transparent; position: relative; }
        .dark .btn-eid { border-color: #fff; box-shadow: 4px 4px 0px 0px #F59E0B; }
        .btn-eid:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #000; }
        .dark .btn-eid:active:not(:disabled) { box-shadow: 0px 0px 0px 0px #F59E0B; transform: translate(4px, 4px); }
        .btn-eid:disabled { opacity: 0.6; cursor: not-allowed; filter: grayscale(100%); transform: none; }
        .btn-choice.is-active { background-color: #047857 !important; color: #fff !important; border-color: #000 !important; box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.3) !important; }
        .dark .btn-choice.is-active { background-color: #F59E0B !important; border-color: #fff !important; color: #000 !important; box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.3) !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .editor-container { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #bg-picker { -webkit-appearance: none; border: 3px solid #000; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; padding: 0; overflow: hidden; box-shadow: 3px 3px 0px #000;}
        .dark #bg-picker { border-color: #fff; box-shadow: 3px 3px 0px #F59E0B; }
        #bg-picker::-webkit-color-swatch-wrapper { padding: 0; }
        #bg-picker::-webkit-color-swatch { border: none; border-radius: 8px; }
        .font-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        @keyframes toastFade { 0% { top: -100px; opacity: 0; } 10% { top: 20px; opacity: 1; } 90% { top: 20px; opacity: 1; } 100% { top: -100px; opacity: 0; } }
        .toast-show { animation: toastFade 3.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .float-anim { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        
        .sticker-thumb { width: 45px; height: 45px; object-fit: contain; cursor: pointer; padding: 4px; border-radius: 8px; border: 2px solid transparent; transition: all 0.2s; }
        .sticker-thumb:hover { border-color: #F59E0B; transform: scale(1.1); background: rgba(255,255,255,0.5); }
    </style>
</head>
<body class="text-black dark:text-white bg-eid-cream dark:bg-eid-darker transition-colors duration-500 relative min-h-screen">

    <!-- Animasi Background -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] bg-eid-green/20 dark:bg-eid-green/40 rounded-full blur-[80px] mix-blend-multiply dark:mix-blend-screen animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[50vw] h-[50vw] bg-eid-gold/30 dark:bg-eid-gold/20 rounded-full blur-[100px] mix-blend-multiply dark:mix-blend-screen animate-blob" style="animation-delay: 2s;"></div>
        <div class="absolute bottom-[-10%] left-[20%] w-[70vw] h-[70vw] bg-eid-green/30 dark:bg-eid-dark/50 rounded-full blur-[90px] mix-blend-multiply dark:mix-blend-screen animate-blob" style="animation-delay: 4s;"></div>
        <div class="absolute inset-0 bg-eid-grid animate-grid-scroll opacity-80 dark:opacity-60"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed left-1/2 transform -translate-x-1/2 -top-[100px] z-[999] bg-eid-green dark:bg-eid-gold text-white dark:text-black px-6 py-3 rounded-full border-2 border-black dark:border-white shadow-eid dark:shadow-eid-dark font-bold text-sm text-center flex items-center gap-2 transition-all">
        <span id="toast-icon">🌙</span>
        <span id="toast-msg">Pesan disini</span>
    </div>

    <!-- Music Toggle -->
    <button onclick="toggleMusic()" class="fixed top-4 left-4 z-[200] w-12 h-12 glass-panel border-3 border-black dark:border-white rounded-full flex items-center justify-center shadow-eid dark:shadow-eid-dark hover:scale-110 transition-transform float-anim text-2xl">
        <span id="music-icon">🎵</span>
    </button>
    <audio id="bg-music" loop>
        <source src="music/bgm.mp3" type="audio/mpeg">
        Browser Anda tidak mendukung elemen audio.
    </audio>

    <button onclick="toggleTheme()" class="fixed top-4 right-4 z-[200] w-12 h-12 glass-panel border-3 border-black dark:border-white rounded-full flex items-center justify-center shadow-eid dark:shadow-eid-dark hover:scale-110 transition-transform float-anim text-2xl">
        <span class="dark:hidden">☀️</span>
        <span class="hidden dark:block">🌙</span>
    </button>

    <div id="flash" class="fixed inset-0 z-[200] pointer-events-none"></div>

    <!-- WELCOME SCREEN -->
    <section id="welcome-screen" class="fixed inset-0 z-[150] flex items-center justify-center p-4 lg:p-6">
        <div class="w-full max-w-md space-y-8 text-center relative">
            
            <!-- STIKER MELAYANG CUSTOM (Mengambil dari folder stickers/) -->
            <img src="stickers/float1.png" onerror="this.style.display='none'" class="absolute -top-10 -left-6 w-20 sm:w-28 object-contain float-anim hidden sm:block drop-shadow-lg" style="animation-delay: 0.2s" alt="Float 1">
            <img src="stickers/float2.png" onerror="this.style.display='none'" class="absolute -bottom-10 -right-6 w-20 sm:w-28 object-contain float-anim hidden sm:block drop-shadow-lg" style="animation-delay: 0.5s" alt="Float 2">
            <img src="stickers/float3.png" onerror="this.style.display='none'" class="absolute top-20 -right-4 w-16 sm:w-24 object-contain float-anim hidden sm:block drop-shadow-lg" style="animation-delay: 0.8s" alt="Float 3">

            <div class="space-y-2 glass-panel border-4 border-black dark:border-white p-6 rounded-3xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] dark:shadow-[8px_8px_0px_0px_#F59E0B] transform -rotate-2 backdrop-blur-lg relative z-10">
                <h1 class="text-5xl sm:text-6xl font-black italic tracking-tighter text-eid-green dark:text-eid-gold uppercase drop-shadow-md" style="font-family: 'Unbounded', sans-serif; -webkit-text-stroke: 2px black;">EID<br>STUDIO</h1>
                <p class="text-white dark:text-black text-[10px] sm:text-xs font-bold uppercase tracking-[0.3em] mt-2 bg-eid-gold dark:bg-white inline-block px-3 py-1 border-2 border-black rounded-full shadow-sm">Edisi Idul Adha 🐐</p>
            </div>
            
            <div id="step-name" class="space-y-4 pt-8 relative z-10">
                <input type="text" id="user-name" placeholder="MASUKKAN NAMA KAMU..." class="w-full glass-panel border-3 border-black dark:border-white p-5 rounded-2xl text-center font-black outline-none focus:bg-eid-cream dark:focus:bg-eid-green/50 uppercase transition-all shadow-eid dark:shadow-eid-dark text-black dark:text-white placeholder-gray-500 dark:placeholder-gray-300">
                <button onclick="goToLayoutStep()" class="btn-eid bg-eid-green dark:bg-eid-gold text-white dark:text-black w-full py-5 rounded-2xl text-lg">Mulai Foto Bareng! 📸</button>
            </div>

            <div id="step-layout" class="space-y-6 hidden animate-[slideUp_0.4s_ease] pt-8 relative z-10">
                <p class="font-black uppercase tracking-widest text-sm bg-black text-white dark:bg-white dark:text-black inline-block px-4 py-2 rounded-full border-2 border-transparent shadow-md">Pilih Gaya Frame 📸</p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="selectLayoutAndStart('strip')" class="btn-eid btn-choice glass-panel text-black dark:text-white p-6 rounded-2xl flex flex-col items-center justify-center gap-4 h-40 sm:h-48 transition-all">
                        <div class="w-10 h-20 sm:w-12 sm:h-24 bg-eid-green/30 rounded-lg border-2 border-black dark:border-white flex flex-col gap-1 p-1.5 shadow-sm">
                            <div class="bg-black/80 dark:bg-white/80 flex-1 rounded-sm"></div>
                            <div class="bg-black/80 dark:bg-white/80 flex-1 rounded-sm"></div>
                            <div class="bg-black/80 dark:bg-white/80 flex-1 rounded-sm"></div>
                        </div>
                        <span class="text-xs sm:text-sm font-black tracking-wide">Strip (3)</span>
                    </button>
                    <button onclick="selectLayoutAndStart('grid')" class="btn-eid btn-choice glass-panel text-black dark:text-white p-6 rounded-2xl flex flex-col items-center justify-center gap-4 h-40 sm:h-48 transition-all">
                        <div class="w-16 h-16 sm:w-20 sm:h-20 bg-eid-gold/30 rounded-lg border-2 border-black dark:border-white grid grid-cols-2 gap-1.5 p-1.5 shadow-sm">
                            <div class="bg-black/80 dark:bg-white/80 rounded-sm"></div>
                            <div class="bg-black/80 dark:bg-white/80 rounded-sm"></div>
                            <div class="bg-black/80 dark:bg-white/80 rounded-sm"></div>
                            <div class="bg-black/80 dark:bg-white/80 rounded-sm"></div>
                        </div>
                        <span class="text-xs sm:text-sm font-black tracking-wide">Grid (4)</span>
                    </button>
                </div>
                <button onclick="backToNameStep()" class="text-[11px] font-black text-gray-700 dark:text-gray-300 uppercase tracking-widest hover:text-black dark:hover:text-white transition-colors block mx-auto mt-4 underline decoration-2 underline-offset-4 drop-shadow-md">← Kembali</button>
            </div>
        </div>
    </section>

    <!-- MAIN APP - RESPONSIVE -->
    <main id="main-app" class="hidden w-full flex-col lg:flex-row relative z-10 min-h-screen">
        
        <!-- CAMERA SECTION -->
        <div id="camera-section" class="w-full lg:w-1/2 lg:sticky lg:top-0 lg:h-screen flex flex-col items-center justify-center p-4 lg:p-8 relative shrink-0">
            <div class="relative w-full max-w-md aspect-square rounded-[2rem] overflow-hidden border-4 border-black dark:border-white bg-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] dark:shadow-[8px_8px_0px_0px_#F59E0B]">
                <video id="video" autoplay playsinline class="mirror w-full h-full object-cover"></video>
                <div id="countdown-box" class="absolute inset-0 flex items-center justify-center text-[150px]"></div>
                
                <div id="snap-container" class="absolute bottom-6 left-0 right-0 flex flex-col justify-center items-center gap-4">
                    <button onclick="switchCamera()" class="btn-eid w-12 h-12 sm:w-14 sm:h-14 bg-eid-gold dark:bg-eid-cream rounded-full flex items-center justify-center border-3 border-black text-xl sm:text-2xl dark:text-black">🔄</button>
                    <button id="snap-btn" onclick="takeIndividualSnap()" class="w-16 h-16 sm:w-20 sm:h-20 bg-eid-green dark:bg-eid-gold border-4 border-black dark:border-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-transform shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] group px-0">
                        <div class="w-10 h-10 sm:w-14 sm:h-14 bg-white rounded-full border-2 border-black flex items-center justify-center text-xl sm:text-2xl group-hover:bg-eid-cream transition-colors">📸</div>
                    </button>
                </div>
            </div>

            <div id="capture-controls" class="mt-8 w-full max-w-md flex flex-col items-center gap-4 opacity-0 pointer-events-none transition-all duration-300">
                <p class="font-black uppercase tracking-widest text-[10px] sm:text-xs bg-black text-white dark:bg-white dark:text-black px-3 py-1 rounded-full border-2 border-black dark:border-white shadow-md">Hasil Jepretan 👀</p>
                <div class="flex gap-4 w-full">
                    <button onclick="retakePhoto()" class="btn-eid glass-panel text-black dark:text-white flex-1 px-4 py-3 sm:px-6 sm:py-4 rounded-xl text-xs sm:text-sm">Ulangi</button>
                    <button onclick="keepPhoto()" class="btn-eid bg-eid-gold dark:bg-eid-green text-black dark:text-white flex-1 px-4 py-3 sm:px-6 sm:py-4 rounded-xl text-xs sm:text-sm">Keep It ✨</button>
                </div>
            </div>

            <div id="layout-tools" class="mt-6 w-full max-w-md">
                <div class="glass-panel p-2 sm:p-3 rounded-2xl flex gap-3 border-3 border-black dark:border-white shadow-eid dark:shadow-eid-dark">
                    <button onclick="setLayout('strip')" id="btn-strip" class="btn-eid btn-choice flex-1 py-2 sm:py-3 bg-white/50 dark:bg-black/50 text-black dark:text-white rounded-xl text-[10px] sm:text-xs backdrop-blur-md">Strip (3)</button>
                    <button onclick="setLayout('grid')" id="btn-grid" class="btn-eid btn-choice flex-1 py-2 sm:py-3 bg-white/50 dark:bg-black/50 text-black dark:text-white rounded-xl text-[10px] sm:text-xs backdrop-blur-md">Grid (4)</button>
                </div>
            </div>
        </div>

        <!-- EDITING SECTION -->
        <div id="editing-section" class="w-full lg:w-1/2 glass-panel border-t-4 lg:border-t-0 lg:border-l-4 border-black dark:border-white flex flex-col items-center p-4 lg:p-12 shrink-0 shadow-[-10px_0px_30px_rgba(0,0,0,0.1)]">
            <div class="w-full max-w-md space-y-8 sm:space-y-10 pb-12">
                <div class="flex flex-col items-center w-full">
                    <!-- WRAPPER UNTUK STIKER -->
                    <div id="canvas-wrapper">
                        <canvas id="main-canvas"></canvas>
                        <div id="sticker-area" class="absolute inset-0"></div>
                    </div>
                </div>

                <div id="editor-tools" class="hidden editor-container space-y-8 sm:space-y-10">
                    
                    <!-- 10 Filter -->
                    <div class="space-y-4 bg-white/80 dark:bg-eid-dark/80 backdrop-blur-xl p-4 sm:p-5 rounded-3xl border-3 border-black dark:border-white shadow-eid dark:shadow-eid-dark">
                        <label class="text-[10px] sm:text-xs font-black text-black dark:text-white uppercase tracking-[0.1em] bg-eid-green dark:bg-eid-gold px-2 py-1 rounded-md text-white dark:text-black border-2 border-black block w-max">1. Pilih Filter (10 Opsi) 🎨</label>
                        <div class="grid grid-cols-5 gap-1.5 sm:gap-2 pt-2">
                            <button onclick="setFilter('none')" data-filter="none" class="btn-eid btn-choice bg-white dark:bg-gray-800 text-black dark:text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-[8px] sm:text-[9px]">Normal</button>
                            <button onclick="setFilter('grayscale(100%)')" data-filter="grayscale(100%)" class="btn-eid btn-choice bg-white dark:bg-gray-800 text-black dark:text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-[8px] sm:text-[9px]">B&W</button>
                            <button onclick="setFilter('sepia(80%)')" data-filter="sepia(80%)" class="btn-eid btn-choice bg-white dark:bg-gray-800 text-black dark:text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-[8px] sm:text-[9px]">Sepia</button>
                            <button onclick="setFilter('contrast(1.4) brightness(0.9)')" data-filter="contrast(1.4) brightness(0.9)" class="btn-eid btn-choice bg-white dark:bg-gray-800 text-black dark:text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-[8px] sm:text-[9px]">Vintage</button>
                            <button onclick="setFilter('hue-rotate(30deg) sepia(20%)')" data-filter="hue-rotate(30deg) sepia(20%)" class="btn-eid btn-choice bg-white dark:bg-gray-800 text-black dark:text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-[8px] sm:text-[9px]">Warm</button>
                            <button onclick="setFilter('sepia(40%) contrast(1.2) brightness(1.1) hue-rotate(-15deg)')" data-filter="sepia(40%) contrast(1.2) brightness(1.1) hue-rotate(-15deg)" class="btn-eid btn-choice bg-white dark:bg-gray-800 text-black dark:text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-[8px] sm:text-[9px]">Golden</button>
                            <button onclick="setFilter('hue-rotate(-50deg) saturate(1.5)')" data-filter="hue-rotate(-50deg) saturate(1.5)" class="btn-eid btn-choice bg-white dark:bg-gray-800 text-black dark:text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-[8px] sm:text-[9px]">Emerald</button>
                            <button onclick="setFilter('opacity(0.8) contrast(0.8) brightness(1.2)')" data-filter="opacity(0.8) contrast(0.8) brightness(1.2)" class="btn-eid btn-choice bg-white dark:bg-gray-800 text-black dark:text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-[8px] sm:text-[9px]">Fade</button>
                            <button onclick="setFilter('hue-rotate(180deg) saturate(0.8)')" data-filter="hue-rotate(180deg) saturate(0.8)" class="btn-eid btn-choice bg-white dark:bg-gray-800 text-black dark:text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-[8px] sm:text-[9px]">Cool</button>
                            <button onclick="setFilter('contrast(1.5) saturate(1.2)')" data-filter="contrast(1.5) saturate(1.2)" class="btn-eid btn-choice bg-white dark:bg-gray-800 text-black dark:text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-[8px] sm:text-[9px]">Crisp</button>
                        </div>
                    </div>

                    <!-- 20 Fonts -->
                    <div class="space-y-4 bg-white/80 dark:bg-eid-dark/80 backdrop-blur-xl p-4 sm:p-5 rounded-3xl border-3 border-black dark:border-white shadow-eid dark:shadow-eid-dark">
                        <label class="text-[10px] sm:text-xs font-black text-black dark:text-white uppercase tracking-[0.1em] bg-eid-gold dark:bg-eid-green px-2 py-1 rounded-md text-black dark:text-white border-2 border-black block w-max">2. Pilih Font Islami 🔠</label>
                        <div class="font-grid pt-2 grid-cols-4 sm:grid-cols-5">
                            <button onclick="setFont('Amiri')" data-font="Amiri" class="btn-eid btn-choice bg-white dark:bg-gray-800 p-1.5 sm:p-2 text-black dark:text-white rounded-lg text-[8px] sm:text-[9px]">Amiri</button>
                            <button onclick="setFont('Aref Ruqaa')" data-font="Aref Ruqaa" class="btn-eid btn-choice bg-white dark:bg-gray-800 p-1.5 sm:p-2 text-black dark:text-white rounded-lg text-[8px] sm:text-[9px]">Aref Ruq</button>

                            <input type="color" id="bg-picker" value="#ffffff" oninput="changeBg(this.value)">

                    <!-- Sistem Stiker Custom PNG -->
                    <div class="space-y-4 bg-white/80 dark:bg-eid-dark/80 backdrop-blur-xl p-4 sm:p-5 rounded-3xl border-3 border-black dark:border-white shadow-eid dark:shadow-eid-dark">

                            Simpan & Dapatkan QR
                        </button>
                        <button onclick="window.location.reload()" class="btn-eid bg-white/50 dark:bg-black/50 text-black dark:text-white w-full py-3 sm:py-4 rounded-xl sm:rounded-2xl text-[9px] sm:text-[10px] mt-4 backdrop-blur-md">
                            Reset Sesi
                        </button>

        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-3Cg40eElzmYghvBv__8S3xc1GVXrUCGH6CimfKZm0Vmil_Y0CWMKth9W_ka0lZUhzQ/exec"; 
        const DRIVE_URL = "https://drive.google.com/drive/folders/1wfP3gvg2WOY_mgiBqmuGjuw5Mz-KXxFF";

        // ==========================================
        // KONFIGURASI NAMA FILE STIKER
        // ==========================================
        const DAFTAR_STIKER_PNG = [
            "stickers/1.png",
            "stickers/2.png",
            "stickers/3.png",
            "stickers/4.png",
            "stickers/5.png",
            "stickers/6.png"
        ];

        const video = document.getElementById('video');
        const canvas = document.getElementById('main-canvas');
        const flash = document.getElementById('flash');
        const bgMusic = document.getElementById('bg-music');
        
        let userName = "";
        let sessionPhotos = [];
        let rawPhotos = [];
        let currentLayout = 'strip';
        let bgColor = '#ffffff';
        let currentFont = 'Plus Jakarta Sans';
        let currentFilter = 'none';
        let lastTempSnap = null;
        let currentFacingMode = 'user';
        let activeSticker = null;
        let isMusicPlaying = false;

        // LOAD MENU STIKER OTOMATIS
        window.onload = () => {
            const container = document.getElementById('sticker-png-list');
            DAFTAR_STIKER_PNG.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'sticker-thumb';
                img.alt = 'Stiker';
                img.onerror = () => { img.style.display = 'none'; };
                img.onclick = () => {
                    createStickerElement(src);
                    showCuteToast("Stiker ditambahkan!", "🌟");
                };
                container.appendChild(img);
            });
        };

        // INTERAKSI PENGGUNA UNTUK MEMUTAR MUSIK
        document.body.addEventListener('click', () => {
            if(!isMusicPlaying) {
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    document.getElementById('music-icon').innerText = '🎵';
                }).catch(error => {
                    console.log("Autoplay dicegah oleh browser.");
                });
            }
        }, { once: true }); // event hanya berjalan sekali

        function toggleMusic() {
            if(isMusicPlaying) {
                bgMusic.pause();
                isMusicPlaying = false;
                document.getElementById('music-icon').innerText = '🔇';
                showCuteToast("Musik dijeda", "🔇");
            } else {
                bgMusic.play();
                isMusicPlaying = true;
                document.getElementById('music-icon').innerText = '🎵';
                showCuteToast("Musik diputar", "🎵");
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark'); localStorage.setItem('theme', 'light'); showCuteToast("☀️ Mode Terang Aktif!");
            } else {
                html.classList.add('dark'); localStorage.setItem('theme', 'dark'); showCuteToast("🌙 Mode Gelap Aktif!");
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark'); }

        function showCuteToast(msg, icon = "🌙") {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = icon;
            toast.classList.remove('toast-show'); void toast.offsetWidth; toast.classList.add('toast-show');
        }

        function copyDriveLink() {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(DRIVE_URL); showCuteToast("Link berhasil disalin!", "📋");
                } else {
                    let tempInput = document.createElement("input"); tempInput.value = DRIVE_URL;
                    document.body.appendChild(tempInput); tempInput.select(); document.execCommand("copy");
                    document.body.removeChild(tempInput); showCuteToast("Link berhasil disalin!", "📋");
                }
            } catch (err) { showCuteToast("Gagal menyalin link.", "⚠️"); }
        }

        canvas.addEventListener('click', () => { setActiveSticker(null); });

        function addCustomStickerFile(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                createStickerElement(e.target.result);
                showCuteToast("Stiker custom berhasil diupload!", "📁");
            }
            reader.readAsDataURL(file);
            event.target.value = ''; 
        }

        function createStickerElement(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'absolute cursor-move select-none drop-shadow-md z-50';
            img.style.width = '100px'; 
            
            const area = document.getElementById('sticker-area');
            img.style.top = (area.offsetHeight / 2 - 50) + 'px';
            img.style.left = (area.offsetWidth / 2 - 50) + 'px';

            img.onload = () => {
                area.appendChild(img);
                makeDraggable(img);
                setActiveSticker(img);
            };
        }

        function setActiveSticker(imgElement) {
            if(activeSticker) activeSticker.classList.remove('sticker-active');
            activeSticker = imgElement;
            const controls = document.getElementById('sticker-controls');
            
            if(activeSticker) {
                activeSticker.classList.add('sticker-active');
                controls.classList.remove('hidden');
                document.getElementById('sticker-size-slider').value = parseInt(activeSticker.style.width);
            } else {
                controls.classList.add('hidden');
            }
        }

        function resizeActiveSticker(val) { if(activeSticker) { activeSticker.style.width = val + 'px'; } }
        function deleteActiveSticker() { if(activeSticker) { activeSticker.remove(); setActiveSticker(null); } }

        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = dragMouseDown; el.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault(); setActiveSticker(el);
                let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                let clientY = e.clientY || (e.touches && e.touches[0].clientY);
                pos3 = clientX; pos4 = clientY;
                document.onmouseup = closeDragElement; document.ontouchend = closeDragElement;
                document.onmousemove = elementDrag; document.ontouchmove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                let clientY = e.clientY || (e.touches && e.touches[0].clientY);
                pos1 = pos3 - clientX; pos2 = pos4 - clientY;
                pos3 = clientX; pos4 = clientY;
                el.style.top = (el.offsetTop - pos2) + "px"; el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null; document.onmousemove = null;
                document.ontouchend = null; document.ontouchmove = null;
            }
        }

        function getMergedExportCanvas() {
            setActiveSticker(null); 
            drawFinal(); 
            
            const ctx = canvas.getContext('2d');
            const area = document.getElementById('sticker-area');
            const stickers = area.children;
            const scaleX = canvas.width / area.offsetWidth;
            const scaleY = canvas.height / area.offsetHeight;
            const areaRect = area.getBoundingClientRect();

            for (let i = 0; i < stickers.length; i++) {
                const img = stickers[i];
                const imgRect = img.getBoundingClientRect();
                const x = (imgRect.left - areaRect.left) * scaleX;
                const y = (imgRect.top - areaRect.top) * scaleY;
                const w = imgRect.width * scaleX;
                const h = imgRect.height * scaleY;
                ctx.drawImage(img, x, y, w, h);
            }
            return canvas.toDataURL('image/png', 1.0);
        }

        function triggerDownloadHD() {
            if (sessionPhotos.length === 0) return;
            const link = document.createElement('a');
            link.download = `EID-SNAP-${userName}-${Date.now()}.png`;
            link.href = getMergedExportCanvas(); 
            link.click();
            drawFinal(); 
            showCuteToast("Yeay! Foto lebaranmu berhasil didownload!", "💾");
        }

        async function triggerSharePhoto() {
            if (sessionPhotos.length === 0) return;
            if (!navigator.share) { showCuteToast("Yah, browser kamu belum support share. Download aja ya!", "🥲"); return; }
            try {
                const blob = await (await fetch(getMergedExportCanvas())).blob();
                const file = new File([blob], `EID-SNAP-${userName}.png`, { type: 'image/png' });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ title: '✨ Eid Studio ✨', text: `Selamat Idul Adha! Lihat hasil photobooth aku nih! 🐐🌙`, files: [file] });
                    showCuteToast("Yay! Berhasil dibagikan!", "🚀");
                } else { showCuteToast("Browser ga support bagi gambar. Download aja ya!", "🥲"); }
            } catch (err) { showCuteToast("Ada error pas mau share nih.", "⚠️"); } 
            finally { drawFinal(); }
        }

        async function initCamera(facingMode = 'user') {
            if (video.srcObject) { video.srcObject.getTracks().forEach(track => track.stop()); }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode, aspectRatio: 1/1, width: 1080, height: 1080 }, audio: false });
                video.srcObject = stream;
                if(facingMode === 'user') video.classList.add('mirror'); else video.classList.remove('mirror');
            } catch (e) { alert("Kamera tidak ditemukan."); }
        }

        function switchCamera() { currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user'; initCamera(currentFacingMode); }

        function goToLayoutStep() {
            userName = document.getElementById('user-name').value.trim().toUpperCase() || "GUEST";
            document.getElementById('step-name').classList.add('hidden'); document.getElementById('step-layout').classList.remove('hidden');
        }

        function backToNameStep() {
            document.getElementById('step-layout').classList.add('hidden'); document.getElementById('step-name').classList.remove('hidden');
        }

        function selectLayoutAndStart(layout) {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden', 'flex'); document.getElementById('main-app').classList.add('flex');
            setLayout(layout); initCamera(currentFacingMode); syncActiveChoiceUI();
        }

        function setLayout(l) {
            currentLayout = l;
            document.querySelectorAll('#btn-strip, #btn-grid').forEach(b => b.classList.remove('is-active'));
            const btn = document.getElementById(`btn-${l}`); if (btn) btn.classList.add('is-active');
            drawFinal();
        }

        function setFont(f) {
            currentFont = f;
            document.querySelectorAll('[data-font]').forEach(b => b.classList.remove('is-active'));
            const active = document.querySelector(`[data-font="${CSS.escape(f)}"]`); if (active) active.classList.add('is-active');
            drawFinal();
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('is-active'));
            const active = document.querySelector(`[data-filter="${CSS.escape(f)}"]`); if (active) active.classList.add('is-active');
            drawFinal();
        }

        function changeBg(c) { bgColor = c; drawFinal(); }

        async function takeIndividualSnap() {
            const max = currentLayout === 'strip' ? 3 : 4;
            if(sessionPhotos.length >= max) return;
            
            document.getElementById('snap-btn').disabled = true;
            await countdown(3); triggerFlash();

            const temp = document.createElement('canvas'); temp.width = 800; temp.height = 800; const ctx = temp.getContext('2d');
            if(currentFacingMode === 'user') { ctx.translate(800, 0); ctx.scale(-1, 1); }
            
            const size = Math.min(video.videoWidth, video.videoHeight);
            const startX = (video.videoWidth - size) / 2; const startY = (video.videoHeight - size) / 2;
            ctx.drawImage(video, startX, startY, size, size, 0, 0, 800, 800);
            
            lastTempSnap = temp; drawFinal(true); toggleOverlay(true);
        }

        function toggleOverlay(show) {
            const c = document.getElementById('capture-controls'); const s = document.getElementById('snap-container'); const lt = document.getElementById('layout-tools');
            if(show) { 
                c.classList.remove('pointer-events-none'); c.classList.add('opacity-100'); s.classList.add('hidden'); lt.classList.add('hidden'); video.pause(); 
            } else { 
                c.classList.add('pointer-events-none'); c.classList.remove('opacity-100'); s.classList.remove('hidden'); lt.classList.remove('hidden'); video.play(); document.getElementById('snap-btn').disabled = false; 
            }
        }

        function keepPhoto() {
            sessionPhotos.push(lastTempSnap); rawPhotos.push(lastTempSnap.toDataURL('image/png').split(',')[1]);
            toggleOverlay(false); drawFinal();
            
            const max = currentLayout === 'strip' ? 3 : 4;
            if(sessionPhotos.length >= max) {
                document.getElementById('editor-tools').classList.remove('hidden');
                setTimeout(() => { document.getElementById('editing-section').scrollIntoView({ behavior: 'smooth' }); }, 100);
            }
        }

        function retakePhoto() { lastTempSnap = null; toggleOverlay(false); drawFinal(); }

        function syncActiveChoiceUI() {
            document.querySelectorAll('#btn-strip, #btn-grid').forEach(b => b.classList.remove('is-active'));
            const layoutBtn = document.getElementById(`btn-${currentLayout}`); if (layoutBtn) layoutBtn.classList.add('is-active');

            document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('is-active'));
            const filterBtn = document.querySelector(`[data-filter="${CSS.escape(currentFilter)}"]`); if (filterBtn) filterBtn.classList.add('is-active');

            document.querySelectorAll('[data-font]').forEach(b => b.classList.remove('is-active'));
            const fontBtn = document.querySelector(`[data-font="${CSS.escape(currentFont)}"]`); if (fontBtn) fontBtn.classList.add('is-active');
        }

        function countdown(sec) {
            const box = document.getElementById('countdown-box');
            return new Promise(resolve => {
                let t = sec;
                let timer = setInterval(() => {
                    box.innerText = t;
                    if (t <= 0) { clearInterval(timer); box.innerText = ''; resolve(); }
                    t--;
                }, 1000);
            });
        }

        function triggerFlash() {
            flash.classList.add('flash-active');
            setTimeout(() => flash.classList.remove('flash-active'), 400);
        }

        function drawFinal(isPreview = false) {
            const ctx = canvas.getContext('2d');
            const isStrip = currentLayout === 'strip';
            
            canvas.width = isStrip ? 400 : 800;
            canvas.height = isStrip ? 1200 : 860; 
            
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const maxSlots = isStrip ? 3 : 4;
            for(let i=0; i < maxSlots; i++) {
                const x = isStrip ? 20 : (i % 2 === 0 ? 20 : 410);
                const y = isStrip ? (20 + (i * 380)) : (i < 2 ? 20 : 410);
                
                let imgToDraw = sessionPhotos[i];
                let isTemp = false;

                if(!imgToDraw && isPreview && i === sessionPhotos.length) {
                    imgToDraw = lastTempSnap;
                    isTemp = true;
                }

                if(!imgToDraw) {
                    ctx.fillStyle = 'rgba(0,0,0,0.05)';
                    ctx.fillRect(x, y, 360, 360);
                } else {
                    ctx.save();
                    if(!isTemp) ctx.filter = currentFilter;
                    ctx.drawImage(imgToDraw, 0, 0, 800, 800, x, y, 360, 360);
                    if(isTemp) {
                        ctx.strokeStyle = '#F59E0B'; 
                        ctx.lineWidth = 8;
                        ctx.strokeRect(x+4, y+4, 352, 352);
                    }
                    ctx.restore();
                }
            }

            const r = parseInt(bgColor.slice(1,3), 16);
            const g = parseInt(bgColor.slice(3,5), 16);
            const b = parseInt(bgColor.slice(5,7), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            const textColor = brightness > 128 ? '#000000' : '#ffffff';

            ctx.font = `bold 28px "${currentFont}"`;
            ctx.textAlign = 'center';
            const txt = document.getElementById('custom-text').value.toUpperCase() || `EID MUBARAK x ${userName}`;

            ctx.fillStyle = textColor;
            ctx.fillText(txt, canvas.width / 2, canvas.height - 35);
        }

        async function processAndUpload() {
            const btn = document.getElementById('sync-btn');
            const status = document.getElementById('upload-status');
            const box = document.getElementById('upload-box');
            
            btn.disabled = true; btn.innerText = "SEDANG MENGIRIM...";
            box.classList.remove('hidden');
            const sessionID = `${userName}-${Date.now()}`;

            for(let i=0; i<rawPhotos.length; i++) {
                status.innerText = `SYNC PHOTO ${i+1}/${rawPhotos.length}...`;
                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ sessionID, base64: rawPhotos[i], fileName: `RAW-${i+1}.png` })});
            }
            
            status.innerText = "GENERATING FINAL RESULT...";
            const finalBase64 = getMergedExportCanvas().split(',')[1];
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ sessionID, base64: finalBase64, fileName: `RESULT-${userName}.png` })});
            
            status.innerText = "SESI BERHASIL DISIMPAN!";
            document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(DRIVE_URL)}`;
            btn.innerText = "SELESAI";
            drawFinal(); 
            
            showCuteToast("Horee! Foto berhasil masuk cloud!", "☁️");
        }
    </script>
</body>
